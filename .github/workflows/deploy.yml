name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd webapp
          npm install

      - name: Start server and run tests
        run: |
          cd webapp
          node server.js &
          sleep 3
          npm test
          kill %1

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd webapp
          docker build -t ramachaitanya/webapp:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ramachaitanya --password-stdin

      - name: Push to Docker Hub
        run: docker push ramachaitanya/webapp:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ramachaitanya/webapp:latest
            docker stop webapp || true
            docker rm webapp || true
            docker run -d --restart always --name webapp -p 3000:3000 ramachaitanya/webapp:latest